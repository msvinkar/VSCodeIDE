spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/react_login_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}

app.jwt.secret=${APP_JWT_SECRET:defaultJwtSecretKeyChangeMe12345678901234567890}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
