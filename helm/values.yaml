replicaCount: 2
image:
  repository: yourregistry/springboot-login
  tag: latest
  pullPolicy: IfNotPresent
postgresql:
  image: postgres:15-alpine
  username: postgres
  password: postgres
  database: react_login_db
redis:
  image: redis:7-alpine
pgbouncer:
  image: edoburu/pgbouncer:1.17.0
grafana:
  image: grafana/grafana:10.1.2
prometheusOperator:
  image: quay.io/prometheus-operator/prometheus-operator:v0.62.0
ingress:
  host: login.local
  tlsSecretName: login-tls-secret
jwtSecret: ChangeThisToAStrongSecretAtDeployTime
