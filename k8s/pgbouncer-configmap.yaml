apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
data:
  pgbouncer.ini: |
    [databases]
    react_login_db = host=postgres port=5432 dbname=react_login_db

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = trust
    pool_mode = transaction
    default_pool_size = 20
    reserve_pool_size = 5
    reserve_pool_timeout = 2
    server_reset_query = DISCARD ALL
    ignore_startup_parameters = extra_float_digits
  userlist.txt: |
    "postgres" "postgres"

  userlist.txt: |
    "postgres" "md5$(echo -n 'postgrespostgres' | md5sum | awk '{print $1}')"
